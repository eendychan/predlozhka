<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ПРЕДЛОЖКА ХАНОВА</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      font-size: 64px;
      margin-bottom: 12px;
      letter-spacing: 4px;
      text-shadow:
        0 0 10px #ffffff,
        0 0 25px #ffffff44;
    }

    .subtitle {
      text-align: center;
      color: #b0b0b0;
      margin-bottom: 50px;
      font-size: 16px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    @media (max-width: 1400px) {
      .videos-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 1000px) {
      .videos-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 650px) {
      .videos-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 40px;
      }
    }

    .card {
      background: #14141b;
      border-radius: 18px;
      overflow: hidden;
      transition: 0.2s ease;
      border: 1px solid #262631;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #111;
    }

    .card-content {
      padding: 16px;
    }

    .video-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .ratings {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .rating {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rating-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #d0d0d0;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #222;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      transition: 0.3s;
    }

    .watch-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      text-align: center;
      background: #ffffff;
      color: black;
      text-decoration: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .watch-btn:hover {
      opacity: 0.85;
    }

    .loading {
      padding: 40px;
      text-align: center;
      color: #777;
    }
  </style>
</head>

<body>

  <h1>ПРЕДЛОЖКА ХАНОВА</h1>

  <div class="subtitle">
    поскольку все в рот ебали дискорд, а я в рот ебал гугл докс - предложка переезжает сюда!
  </div>

  <div class="videos-grid" id="videosGrid">
    <div class="loading">загрузка видосиков...</div>
  </div>

  <script>
    /*
    ==========================================================
      ДОБАВЛЕНИЕ ВИДЕО

      Просто вставляй новые объекты в массив videos.

      hype:
      100 = ярко жёлтый неон
      0 = коричневый

      fun:
      100 = 🤣
      75 = 😂
      50 = 😆
      30 = 😁
      10 = 😅
      0 = 😬

      interest:
      100 = яркий голубой неон
      0 = тёмный ночной синий
    ==========================================================
    */

    const videos = [

      {
        url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        hype: 95,
        fun: 85,
        interest: 70
      },

      {
        url: "https://www.youtube.com/watch?v=3GwjfUFyY6M",
        hype: 40,
        fun: 100,
        interest: 25
      },

      {
        url: "https://www.youtube.com/watch?v=L_jWHffIx5E",
        hype: 75,
        fun: 50,
        interest: 80
      }

    ];

    const grid = document.getElementById("videosGrid");

    function getYouTubeID(url) {
      const regExp =
        /^.*(youtu.be\\/|v\\/|u\\/\\w\\/|embed\\/|watch\\?v=|&v=)([^#&?]*).*/;
      const match = url.match(regExp);

      return match && match[2].length === 11
        ? match[2]
        : null;
    }

    function hypeColor(value) {
      const lightness = 25 + value * 0.35;

      return `
        hsl(${40}, 100%, ${lightness}%)
      `;
    }

    function hypeGlow(value) {
      return value > 70
        ? `0 0 12px rgba(255, 230, 0, ${value / 100})`
        : "none";
    }

    function interestColor(value) {
      const lightness = 10 + value * 0.45;

      return `
        hsl(200, 100%, ${lightness}%)
      `;
    }

    function interestGlow(value) {
      return value > 70
        ? `0 0 12px rgba(0, 200, 255, ${value / 100})`
        : "none";
    }

    function funEmoji(value) {
      if (value >= 100) return "🤣";
      if (value >= 75) return "😂";
      if (value >= 50) return "😆";
      if (value >= 30) return "😁";
      if (value >= 10) return "😅";
      return "😬";
    }

    function funColor(value) {
      if (value <= 0) {
        return "#666";
      }

      const lightness = 25 + value * 0.4;

      return `hsl(120, 100%, ${lightness}%)`;
    }

    function funGlow(value) {
      return value > 70
        ? `0 0 12px rgba(0, 255, 100, ${value / 100})`
        : "none";
    }

    async function fetchVideoData(video) {

      const id = getYouTubeID(video.url);

      if (!id) return null;

      try {

        const response = await fetch(
          `https://noembed.com/embed?url=${video.url}`
        );

        const data = await response.json();

        return {
          title: data.title || "без названия",
          thumbnail: `https://img.youtube.com/vi/${id}/maxresdefault.jpg`,
          url: video.url,
          hype: video.hype,
          fun: video.fun,
          interest: video.interest
        };

      } catch (err) {

        return {
          title: "не удалось загрузить название",
          thumbnail: `https://img.youtube.com/vi/${id}/hqdefault.jpg`,
          url: video.url,
          hype: video.hype,
          fun: video.fun,
          interest: video.interest
        };

      }
    }

    async function renderVideos() {

      grid.innerHTML = "";

      const data = await Promise.all(
        videos.map(fetchVideoData)
      );

      data.forEach(video => {

        if (!video) return;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <img class="thumbnail" src="${video.thumbnail}" alt="preview">

          <div class="card-content">

            <div class="video-title">
              ${video.title}
            </div>

            <div class="ratings">

              <div class="rating">
                <div class="rating-top">
                  <span>ХАЙП</span>
                  <span>${video.hype}%</span>
                </div>

                <div class="bar">
                  <div
                    class="fill"
                    style="
                      width:${video.hype}%;
                      background:${hypeColor(video.hype)};
                      box-shadow:${hypeGlow(video.hype)};
                    "
                  ></div>
                </div>
              </div>

              <div class="rating">
                <div class="rating-top">
                  <span>
                    РЖЕКИЧ ${funEmoji(video.fun)}
                  </span>

                  <span>${video.fun}%</span>
                </div>

                <div class="bar">
                  <div
                    class="fill"
                    style="
                      width:${video.fun}%;
                      background:${funColor(video.fun)};
                      box-shadow:${funGlow(video.fun)};
                    "
                  ></div>
                </div>
              </div>

              <div class="rating">
                <div class="rating-top">
                  <span>ИНТЕРЕС</span>
                  <span>${video.interest}%</span>
                </div>

                <div class="bar">
                  <div
                    class="fill"
                    style="
                      width:${video.interest}%;
                      background:${interestColor(video.interest)};
                      box-shadow:${interestGlow(video.interest)};
                    "
                  ></div>
                </div>
              </div>

            </div>

            <a
              class="watch-btn"
              href="${video.url}"
              target="_blank"
            >
              СМОТРЕТЬ
            </a>

          </div>
        `;

        grid.appendChild(card);

      });

    }

    renderVideos();
  </script>

</body>
</html>
