<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ПРЕДЛОЖКА ХАНОВА</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #09090d;
      color: white;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      text-align: center;
      font-size: 64px;
      margin-bottom: 12px;
      letter-spacing: 3px;
      text-shadow:
        0 0 10px #fff,
        0 0 30px rgba(255,255,255,0.3);
    }

    .subtitle {
      text-align: center;
      color: #a0a0a0;
      margin-bottom: 50px;
      font-size: 15px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    @media (max-width: 1400px) {
      .videos-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 1000px) {
      .videos-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .videos-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 38px;
      }
    }

    .card {
      background: #13131a;
      border: 1px solid #252530;
      border-radius: 18px;
      overflow: hidden;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #000;
    }

    .content {
      padding: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .ratings {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .rating-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      color: #d0d0d0;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #222;
    }

    .fill {
      height: 100%;
      border-radius: 999px;
    }

    .btn {
      display: block;
      margin-top: 18px;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: white;
      color: black;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .loading {
      text-align: center;
      padding: 80px;
      color: #777;
      grid-column: 1/-1;
    }
  </style>
</head>

<body>

  <h1>ПРЕДЛОЖКА ХАНОВА</h1>

  <div class="subtitle">
    поскольку все в рот ебали дискорд, а я в рот ебал гугл докс - предложка переезжает сюда!
  </div>

  <div class="videos-grid" id="videosGrid">
    <div class="loading">загрузка видосиков...</div>
  </div>

  <script>

    const grid = document.getElementById("videosGrid");

    function getYouTubeID(url) {

      const regExp =
        /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;

      const match = url.match(regExp);

      return match && match[2].length === 11
        ? match[2]
        : null;
    }

    function hypeColor(value) {

      const light = 20 + value * 0.45;

      return `hsl(50, 100%, ${light}%)`;
    }

    function hypeGlow(value) {

      if (value < 70) return "none";

      return `0 0 16px rgba(255,230,0,${value / 100})`;
    }

    function interestColor(value) {

      const light = 10 + value * 0.45;

      return `hsl(200, 100%, ${light}%)`;
    }

    function interestGlow(value) {

      if (value < 70) return "none";

      return `0 0 16px rgba(0,200,255,${value / 100})`;
    }

    function funColor(value) {

      if (value <= 0) return "#666";

      const light = 25 + value * 0.35;

      return `hsl(120, 100%, ${light}%)`;
    }

    function funGlow(value) {

      if (value < 70) return "none";

      return `0 0 16px rgba(0,255,100,${value / 100})`;
    }

    function funEmoji(value) {

      if (value >= 100) return "🤣";
      if (value >= 75) return "😂";
      if (value >= 50) return "😆";
      if (value >= 30) return "😁";
      if (value >= 10) return "😅";

      return "😬";
    }

    async function loadVideos() {

      try {

        const response = await fetch("./videos.json");

        const videos = await response.json();

        grid.innerHTML = "";

        videos.forEach(video => {

          const id = getYouTubeID(video.url);

          if (!id) return;

          const thumbnail =
            `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;

          const title =
            video.title || "без названия";

          const card = document.createElement("div");

          card.className = "card";

          card.innerHTML = `
            <img
              class="thumbnail"
              src="${thumbnail}"
              alt="preview"
            >

            <div class="content">

              <div class="title">
                ${title}
              </div>

              <div class="ratings">

                <div>
                  <div class="rating-head">
                    <span>ХАЙП</span>
                    <span>${video.hype}%</span>
                  </div>

                  <div class="bar">
                    <div
                      class="fill"
                      style="
                        width:${video.hype}%;
                        background:${hypeColor(video.hype)};
                        box-shadow:${hypeGlow(video.hype)};
                      "
                    ></div>
                  </div>
                </div>

                <div>
                  <div class="rating-head">
                    <span>
                      РЖЕКИЧ ${funEmoji(video.fun)}
                    </span>

                    <span>${video.fun}%</span>
                  </div>

                  <div class="bar">
                    <div
                      class="fill"
                      style="
                        width:${video.fun}%;
                        background:${funColor(video.fun)};
                        box-shadow:${funGlow(video.fun)};
                      "
                    ></div>
                  </div>
                </div>

                <div>
                  <div class="rating-head">
                    <span>ИНТЕРЕС</span>
                    <span>${video.interest}%</span>
                  </div>

                  <div class="bar">
                    <div
                      class="fill"
                      style="
                        width:${video.interest}%;
                        background:${interestColor(video.interest)};
                        box-shadow:${interestGlow(video.interest)};
                      "
                    ></div>
                  </div>
                </div>

              </div>

              <a
                class="btn"
                href="${video.url}"
                target="_blank"
              >
                СМОТРЕТЬ
              </a>

            </div>
          `;

          grid.appendChild(card);

        });

      } catch (err) {

        grid.innerHTML = `
          <div class="loading">
            ошибка загрузки videos.json
          </div>
        `;

        console.error(err);
      }
    }

    loadVideos();

  </script>

</body>
</html>
